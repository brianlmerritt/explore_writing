# Experiment spec. Edit to describe your grid; make_grid.py expands this
# into one row of grid.tsv per (prompt × params × backend) cell.
#
# Each "cell" produces n_samples generations.

# Which prompt recipes to include. These must exist as .yaml files in
# PROMPT_RECIPE_FOLDER_PATH (or prompt_recipe_examples/ if that env var is not set).
recipes:
  - combined
  - story_less_aiisms
  - story_less_extra_bits

# How many samples to draw per (prompt × backend × param) cell.
# The paper suggests even N=1 works, but for exploration you want enough
# samples to see the variance within a cell.
n_samples: 1

# Generation length cap. Set high enough for the longest plausible output;
# you'll use finish_reason=="length" in generations.tsv to spot truncations.
max_tokens: 40000


# Each "backend" is a (provider, model) pair you want to sweep.
# Name it whatever's convenient; the label is what shows up in grid.tsv.
backends:
  - label: claude-opus
    use_in_grid: false
    provider: anthropic
    model: claude-opus-4-7
    parameters:
      temperature: [0.7, 0.8, 0.9, 1.0]
      # top_p: [0.8, 0.95]
      # top_k: [null]

  - label: claude-sonnet
    use_in_grid: true
    provider: anthropic
    model: claude-sonnet-4-6
    parameters:
      temperature: [0.7, 0.8, 0.9, 1.0]
      # top_p: [0.8, 0.95]
      # top_k: [null]

  - label: claude-haiku
    use_in_grid: true
    provider: anthropic
    model: claude-haiku-4-5-20251001
    parameters:
      temperature: [0.7, 0.8, 0.9, 1.0]
      # top_p: [0.8, 0.95]
      # top_k: [null]

  - label: gpt5
    use_in_grid: false
    provider: openai
    model: gpt-5
    parameters:
      temperature: [0.7, 1.0]
      top_p: [1.0]

  - label: gemini-pro
    use_in_grid: false
    provider: gemini
    model: gemini-2.5-pro
    parameters:
      temperature: [0.7, 1.0]
      top_p: [0.8]
      top_k: [40]

  - label: deepseekV4-flash
    use_in_grid: true
    provider: openrouter
    model: deepseek/deepseek-v4-flash
    parameters:
      temperature: [0.7, 1.0, 1.2, 1.4]
      top_p: [0.8, 0.95]
      top_k: [null]


  - label: deepseekV4-pro
    use_in_grid: true
    provider: openrouter
    model: deepseek/deepseek-v4-pro
    parameters:
      temperature: [0.7, 1.0, 1.2, 1.4]
      top_p: [0.8, 0.95]
      top_k: [null]


  - label: openrouter-m2.7
    use_in_grid: true
    provider: openrouter
    model: minimax/minimax-m2.7
    parameters:
      temperature: [0.7, 1.0, 1.2, 1.4, 1.6]
      top_p: [0.8, 0.95]
      top_k: [null]

  - label: openrouter-glm-5.1-less-options
    use_in_grid: false
    provider: openrouter
    model: z-ai/glm-5.1
    parameters:
      temperature: [0.7, 1.0]
      top_p: [0.8, 0.95]
      top_k: [null]

  - label: openrouter-glm-5.1-more-options
    use_in_grid: true
    provider: openrouter
    model: z-ai/glm-5.1
    parameters:
      temperature: [0.7, 1.0, 1.2, 1.4] # 1.6 hallucinates
      top_p: [0.8, 0.95]
      top_k: [null]

  - label: openrouter-kimi-k2.6
    use_in_grid: true
    provider: openrouter
    model: moonshotai/kimi-k2.6
    parameters:
      temperature: [0.7, 1.0, 1.2, 1.4, 1.6]
      top_p: [0.8, 0.95]
      top_k: [null]

  - label: openrouter-mimo-v2-omni
    use_in_grid: true
    provider: openrouter
    model: xiaomi/mimo-v2-omni
    parameters:
      temperature: [0.7, 1.0, 1.2, 1.4, 1.5]
      top_p: [0.8, 0.95]
      top_k: [null]

  - label: local-qwen3.6:35b-more-options
    use_in_grid: true
    provider: local
    model: qwen3.6:35b
    parameters:
      temperature: [0.7, 1.0, 1.2, 1.4, 1.6]
      top_p: [0.8, 0.95]
      top_k: [null]

  - label: local-gpt-oss-more-options
    use_in_grid: true
    provider: local
    model: gpt-oss:20b
    parameters:
      temperature: [0.7, 1.0, 1.2, 1.4, 1.6]
      top_p: [0.8, 0.95]
      top_k: [null]

  - label: local-qqwen3.6:35b-less-options
    use_in_grid: false
    provider: local
    model: qwen3.6:35b
    parameters:
      temperature: [0.7, 1.0]
      top_p: [0.8, 0.95]
      top_k: [null]

  - label: local-gpt-oss-less-options
    use_in_grid: false
    provider: local
    model: gpt-oss:20b
    parameters:
      temperature: [0.7, 1.0]
      top_p: [0.8, 0.95]
      top_k: [null]


# Optional: system prompt applied to every generation. Leave blank to omit.
system: |
  You are helping with creative writing. Produce only the requested prose.
  Do not include headings such as "analysis", "thinking", "plan", "draft", "notes", or "reasoning".
  Do not explain your approach.
  Begin directly with the first sentence of the final story without any thoughts, checking or rewrites.
